<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizDeadlines — Business & Management Conference Deadlines</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f2eb;
  --bg2: #ede9df;
  --bg3: #e3ddd1;
  --ink: #1a1714;
  --ink2: #5a5248;
  --ink3: #9b9088;
  --accent: #c0392b;
  --accent2: #e8d5b7;
  --border: #d5cfc4;
  --card: #faf8f3;
  --green: #2d6a4f;
  --yellow: #e9c46a;
  --red: #c0392b;
  --orange: #e07b39;
  --radius: 3px;
  --mono: 'DM Mono', monospace;
  --serif: 'DM Serif Display', serif;
  --sans: 'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* HEADER */
header {
  border-bottom: 2px solid var(--ink);
  background: var(--ink);
  color: var(--bg);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: var(--serif);
  font-size: 22px;
  letter-spacing: -0.5px;
  color: var(--bg);
  text-decoration: none;
}
.logo span { color: var(--accent); font-style: italic; }

nav { display: flex; gap: 1.5rem; align-items: center; }
nav a {
  color: var(--bg3);
  text-decoration: none;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.03em;
  transition: color .15s;
}
nav a:hover { color: var(--bg); }

/* MAIN LAYOUT */
.page { display: flex; min-height: calc(100vh - 56px); }

/* SIDEBAR */
aside {
  width: 240px;
  flex-shrink: 0;
  border-right: 1.5px solid var(--border);
  background: var(--card);
  padding: 1.5rem 1rem;
  position: sticky;
  top: 56px;
  height: calc(100vh - 56px);
  overflow-y: auto;
}

.sidebar-section { margin-bottom: 1.75rem; }

.sidebar-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 0.6rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid var(--border);
}

.filter-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 100%;
  padding: 5px 8px;
  margin-bottom: 3px;
  background: none;
  border: 1.5px solid transparent;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--sans);
  font-size: 12.5px;
  color: var(--ink2);
  text-align: left;
  transition: all .12s;
}
.filter-btn:hover { background: var(--bg2); color: var(--ink); }
.filter-btn.active {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}

.filter-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.ranking-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 30px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  background: none;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--ink2);
  margin-right: 4px;
  margin-bottom: 4px;
  transition: all .12s;
}
.ranking-btn:hover { border-color: var(--ink); color: var(--ink); }
.ranking-btn.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.ranking-btn.astar.active { background: #c0392b; border-color: #c0392b; color: white; }
.ranking-btn.a.active { background: #2563eb; border-color: #2563eb; color: white; }
.ranking-btn.b.active { background: #059669; border-color: #059669; color: white; }

.sort-btn {
  display: block;
  width: 100%;
  padding: 5px 8px;
  margin-bottom: 3px;
  background: none;
  border: 1.5px solid transparent;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--sans);
  font-size: 12.5px;
  color: var(--ink2);
  text-align: left;
  transition: all .12s;
}
.sort-btn:hover { background: var(--bg2); color: var(--ink); }
.sort-btn.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

.clear-btn {
  width: 100%;
  padding: 7px;
  background: none;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.05em;
  color: var(--ink3);
  transition: all .12s;
}
.clear-btn:hover { border-color: var(--accent); color: var(--accent); }

/* MAIN CONTENT */
main {
  flex: 1;
  min-width: 0;
  padding: 2rem 2rem 4rem;
}

.topbar {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
  gap: .5rem;
}

.result-count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
  letter-spacing: 0.05em;
}

.timezone-note {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
}

/* CONFERENCE CARDS */
.conf-list { display: flex; flex-direction: column; gap: 0; }

.conf-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color .15s, box-shadow .15s;
  animation: fadeIn .2s ease both;
}
.conf-card:hover {
  border-color: var(--ink);
  box-shadow: 3px 3px 0 var(--ink);
}

@keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform: none; } }

.card-body {
  display: grid;
  grid-template-columns: 180px 1fr auto;
  align-items: start;
  gap: 0;
}

/* COUNTDOWN COLUMN */
.card-countdown {
  padding: 1rem 1.25rem;
  border-right: 1.5px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100px;
  background: var(--bg2);
}

.countdown-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 6px;
}

.countdown-display {
  font-family: var(--serif);
  font-size: 38px;
  line-height: 1;
  color: var(--ink);
  letter-spacing: -1px;
}

.countdown-unit {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink3);
  margin-top: 3px;
}

.countdown-display.urgent { color: var(--red); }
.countdown-display.soon { color: var(--orange); }
.countdown-display.past { color: var(--ink3); text-decoration: line-through; }

.deadline-date {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink2);
  margin-top: 8px;
}

/* INFO COLUMN */
.card-info {
  padding: 1rem 1.25rem;
}

.card-header {
  display: flex;
  align-items: baseline;
  gap: .75rem;
  flex-wrap: wrap;
  margin-bottom: 4px;
}

.conf-short {
  font-family: var(--serif);
  font-size: 17px;
  color: var(--ink);
  line-height: 1.2;
}

.conf-short a {
  color: inherit;
  text-decoration: none;
  border-bottom: 1.5px solid transparent;
  transition: border-color .15s;
}
.conf-short a:hover { border-color: var(--accent); }

.conf-name {
  font-size: 12px;
  color: var(--ink2);
  font-weight: 300;
  font-style: italic;
}

.conf-meta {
  display: flex;
  align-items: center;
  gap: .75rem;
  margin-bottom: .6rem;
  flex-wrap: wrap;
}

.conf-dates {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink2);
}
.conf-dates::before { content: "📅 "; }

.conf-location {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink2);
}
.conf-location::before { content: "📍 "; }

.conf-note {
  font-size: 12px;
  color: var(--ink3);
  font-style: italic;
  margin-bottom: .5rem;
}

.tag-list { display: flex; flex-wrap: wrap; gap: 4px; }

.topic-tag {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 7px;
  border-radius: 2px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.04em;
  color: white;
  font-weight: 500;
}

/* RANKING COLUMN */
.card-ranking {
  padding: 1rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  border-left: 1.5px solid var(--border);
  min-width: 70px;
}

.rank-badge {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 2px;
}
.rank-Astar { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
.rank-A { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
.rank-B { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

.conf-link-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--ink3);
  text-decoration: none;
  font-size: 14px;
  transition: all .12s;
}
.conf-link-icon:hover { border-color: var(--ink); color: var(--ink); background: var(--bg2); }

/* STATUS BAR */
.status-bar {
  height: 4px;
  display: flex;
}
.status-bar .fill { flex: 1; background: var(--bg3); position: relative; }
.status-bar .progress {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  background: linear-gradient(90deg, var(--green), var(--yellow));
  transition: width .3s;
}
.status-bar.urgent .progress { background: linear-gradient(90deg, var(--orange), var(--red)); }
.status-bar.past .progress { background: var(--bg3); }

/* EMPTY STATE */
.empty {
  text-align: center;
  padding: 5rem 2rem;
  color: var(--ink3);
}
.empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: .5; }
.empty h3 { font-family: var(--serif); font-size: 22px; color: var(--ink2); margin-bottom: .5rem; }
.empty p { font-size: 13px; }

/* LEGEND STRIP */
.legend {
  display: flex;
  gap: 1.5rem;
  align-items: center;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
  margin-bottom: 1rem;
  flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot {
  width: 10px; height: 10px; border-radius: 1px;
}
.legend-dot.green { background: var(--green); }
.legend-dot.orange { background: var(--orange); }
.legend-dot.red { background: var(--red); }
.legend-dot.gray { background: var(--ink3); }

/* PAST TOGGLE */
.past-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  font-size: 12.5px;
  color: var(--ink2);
  user-select: none;
}
.past-toggle input { cursor: pointer; accent-color: var(--ink); }

/* SEARCH */
.search-wrap {
  position: relative;
  margin-bottom: .75rem;
}
.search-input {
  width: 100%;
  padding: 7px 10px 7px 30px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--sans);
  font-size: 13px;
  color: var(--ink);
  outline: none;
  transition: border-color .12s;
}
.search-input:focus { border-color: var(--ink); }
.search-icon {
  position: absolute;
  left: 9px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink3);
  font-size: 13px;
  pointer-events: none;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  aside { display: none; }
  .card-body { grid-template-columns: 140px 1fr; }
  .card-ranking { display: none; }
}
@media (max-width: 600px) {
  main { padding: 1rem; }
  .card-body { grid-template-columns: 1fr; }
  .card-countdown { border-right: none; border-bottom: 1.5px solid var(--border); flex-direction: row; gap: 1rem; min-height: auto; padding: .75rem 1rem; }
}

/* ALL TOPICS toggle */
.topics-grid { display: flex; flex-direction: column; gap: 2px; }
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo">Biz<span>Deadlines</span></a>
  <nav>
    <a href="#" onclick="scrollToTop()">Countdowns</a>
    <a href="https://github.com" target="_blank" style="opacity:.5">GitHub ↗</a>
  </nav>
</header>

<div class="page">
  <aside>
    <div class="sidebar-section">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" id="searchInput" type="text" placeholder="Search conferences…" oninput="applyFilters()">
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">ABS Ranking</div>
      <div>
        <button class="ranking-btn astar active" data-rank="A*" onclick="toggleRank(this)">A*</button>
        <button class="ranking-btn a active" data-rank="A" onclick="toggleRank(this)">A</button>
        <button class="ranking-btn b active" data-rank="B" onclick="toggleRank(this)">B</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Sort by</div>
      <button class="sort-btn active" data-sort="deadline" onclick="setSort(this)">📅 Deadline (soonest)</button>
      <button class="sort-btn" data-sort="name" onclick="setSort(this)">🔤 Name A–Z</button>
      <button class="sort-btn" data-sort="conference" onclick="setSort(this)">🗓 Conference date</button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Topic</div>
      <button class="filter-btn active" data-topic="ALL" onclick="toggleTopic('ALL', this)">
        <span class="filter-dot" style="background:#1a1714"></span> All topics
      </button>
      <div class="topics-grid" id="topicFilters"></div>
    </div>

    <div class="sidebar-section">
      <label class="past-toggle">
        <input type="checkbox" id="showPast" onchange="applyFilters()"> Show past deadlines
      </label>
    </div>

    <button class="clear-btn" onclick="clearFilters()">RESET FILTERS</button>
  </aside>

  <main>
    <div class="topbar">
      <div>
        <div class="result-count" id="resultCount">Loading…</div>
      </div>
      <div class="legend">
        <span class="legend-item"><span class="legend-dot green"></span> &gt;30 days</span>
        <span class="legend-item"><span class="legend-dot orange"></span> 8–30 days</span>
        <span class="legend-item"><span class="legend-dot red"></span> &lt;7 days</span>
        <span class="legend-item"><span class="legend-dot gray"></span> Passed</span>
      </div>
    </div>

    <div class="conf-list" id="confList"></div>
    <div class="empty" id="emptyState" style="display:none">
      <div class="empty-icon">📭</div>
      <h3>No conferences found</h3>
      <p>Try adjusting your filters or search query.</p>
    </div>
  </main>
</div>

<script src="data.js"></script>
<script>
// State
let activeTopics = new Set(['ALL']);
let activeRanks = new Set(['A*', 'A', 'B']);
let currentSort = 'deadline';
let countdownTimers = {};

// Init topic filters
function buildTopicFilters() {
  const container = document.getElementById('topicFilters');
  Object.entries(TOPICS).sort((a,b) => a[1].label.localeCompare(b[1].label)).forEach(([code, t]) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.topic = code;
    btn.innerHTML = `<span class="filter-dot" style="background:${t.color}"></span> ${t.label} <span style="font-family:var(--mono);font-size:10px;color:var(--ink3);margin-left:auto">${code}</span>`;
    btn.onclick = () => toggleTopic(code, btn);
    container.appendChild(btn);
  });
}

function toggleTopic(code, btn) {
  if (code === 'ALL') {
    activeTopics = new Set(['ALL']);
    document.querySelectorAll('[data-topic]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  } else {
    activeTopics.delete('ALL');
    document.querySelector('[data-topic="ALL"]').classList.remove('active');
    if (activeTopics.has(code)) {
      activeTopics.delete(code);
      btn.classList.remove('active');
      if (activeTopics.size === 0) {
        activeTopics.add('ALL');
        document.querySelector('[data-topic="ALL"]').classList.add('active');
      }
    } else {
      activeTopics.add(code);
      btn.classList.add('active');
    }
  }
  applyFilters();
}

function toggleRank(btn) {
  const r = btn.dataset.rank;
  if (activeRanks.has(r)) {
    if (activeRanks.size > 1) { activeRanks.delete(r); btn.classList.remove('active'); }
  } else {
    activeRanks.add(r); btn.classList.add('active');
  }
  applyFilters();
}

function setSort(btn) {
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSort = btn.dataset.sort;
  applyFilters();
}

function clearFilters() {
  activeTopics = new Set(['ALL']);
  activeRanks = new Set(['A*','A','B']);
  currentSort = 'deadline';
  document.getElementById('searchInput').value = '';
  document.getElementById('showPast').checked = false;
  document.querySelectorAll('[data-topic]').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-topic="ALL"]').classList.add('active');
  document.querySelectorAll('.ranking-btn').forEach(b => b.classList.add('active'));
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-sort="deadline"]').classList.add('active');
  applyFilters();
}

// Date helpers
function parseDate(s) { return new Date(s + 'T23:59:59'); }
function daysUntil(s) {
  const now = new Date();
  const d = parseDate(s);
  return Math.ceil((d - now) / 86400000);
}
function formatDate(s) {
  const d = parseDate(s);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}
function formatConferenceDates(start, end) {
  const s = new Date(start + 'T00:00:00');
  const e = new Date(end + 'T00:00:00');
  const opts = { month:'short', day:'numeric' };
  if (s.getFullYear() === e.getFullYear() && s.getMonth() === e.getMonth()) {
    return `${s.toLocaleDateString('en-US', opts)}–${e.getDate()}, ${s.getFullYear()}`;
  }
  return `${s.toLocaleDateString('en-US', opts)} – ${e.toLocaleDateString('en-US', opts)}, ${e.getFullYear()}`;
}

function countdownStr(days) {
  if (days < 0) return { text: 'Closed', cls: 'past' };
  if (days === 0) return { text: 'Today!', cls: 'urgent' };
  if (days <= 7) return { text: days + '', cls: 'urgent' };
  if (days <= 30) return { text: days + '', cls: 'soon' };
  return { text: days + '', cls: '' };
}

function rankBadgesHtml(conf) {
  const ranks = conf.ranking || [];
  return ranks.map(r => {
    const cls = r === 'A*' ? 'rank-Astar' : r === 'A' ? 'rank-A' : 'rank-B';
    return `<span class="rank-badge ${cls}">${r}</span>`;
  }).join('');
}

function renderCard(conf) {
  const days = daysUntil(conf.deadline);
  const { text: ctText, cls: ctCls } = countdownStr(days);
  const unit = Math.abs(days) === 1 ? 'day' : 'days';
  const statusCls = ctCls === 'urgent' ? 'urgent' : ctCls === 'past' ? 'past' : '';

  // Progress bar: fraction through window from conf-date-90days to deadline
  const deadlineMs = parseDate(conf.deadline).getTime();
  const startMs = deadlineMs - 90 * 86400000;
  const nowMs = Date.now();
  const pct = Math.min(100, Math.max(0, ((nowMs - startMs) / (deadlineMs - startMs)) * 100));

  const topicTags = (conf.topics || []).map(t => {
    const info = TOPICS[t] || { label: t, color: '#888' };
    return `<span class="topic-tag" style="background:${info.color}">${t}</span>`;
  }).join('');

  return `
<div class="conf-card" data-id="${conf.id}" data-deadline="${conf.deadline}">
  <div class="status-bar ${statusCls}">
    <div class="fill"><div class="progress" style="width:${pct}%"></div></div>
  </div>
  <div class="card-body">
    <div class="card-countdown">
      <div class="countdown-label">Deadline</div>
      <div class="countdown-display ${ctCls}">${ctText}</div>
      <div class="countdown-unit">${ctCls === 'past' ? '' : unit + ' left'}</div>
      <div class="deadline-date">${formatDate(conf.deadline)}</div>
    </div>
    <div class="card-info">
      <div class="card-header">
        <div class="conf-short"><a href="${conf.url}" target="_blank" rel="noopener">${conf.short}</a></div>
        <div class="conf-name">${conf.name}</div>
      </div>
      <div class="conf-meta">
        <span class="conf-dates">${formatConferenceDates(conf.conference_start, conf.conference_end)}</span>
        <span class="conf-location">${conf.location}</span>
      </div>
      ${conf.note ? `<div class="conf-note">${conf.note}</div>` : ''}
      <div class="tag-list">${topicTags}</div>
    </div>
    <div class="card-ranking">
      ${rankBadgesHtml(conf)}
      <a class="conf-link-icon" href="${conf.url}" target="_blank" rel="noopener" title="Conference website">↗</a>
    </div>
  </div>
</div>`;
}

function applyFilters() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const showPast = document.getElementById('showPast').checked;

  let filtered = CONFERENCES.filter(c => {
    // Past filter
    const days = daysUntil(c.deadline);
    if (!showPast && days < 0) return false;

    // Ranking filter
    const hasRank = (c.ranking || []).some(r => activeRanks.has(r));
    if (!hasRank) return false;

    // Topic filter
    if (!activeTopics.has('ALL')) {
      const hasT = (c.topics || []).some(t => activeTopics.has(t));
      if (!hasT) return false;
    }

    // Search
    if (query) {
      const haystack = (c.short + ' ' + c.name + ' ' + c.location + ' ' + (c.topics||[]).join(' ')).toLowerCase();
      if (!haystack.includes(query)) return false;
    }

    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    if (currentSort === 'deadline') return new Date(a.deadline) - new Date(b.deadline);
    if (currentSort === 'name') return a.short.localeCompare(b.short);
    if (currentSort === 'conference') return new Date(a.conference_start) - new Date(b.conference_start);
    return 0;
  });

  const list = document.getElementById('confList');
  const empty = document.getElementById('emptyState');

  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    list.innerHTML = filtered.map(renderCard).join('');
  }

  const total = CONFERENCES.filter(c => showPast || daysUntil(c.deadline) >= 0).length;
  document.getElementById('resultCount').textContent =
    `Showing ${filtered.length} of ${total} conferences`;

  updateURL();
}

// URL state
function updateURL() {
  const topics = [...activeTopics].join(',');
  const ranks = [...activeRanks].join(',');
  const sort = currentSort;
  const q = document.getElementById('searchInput').value;
  const past = document.getElementById('showPast').checked;
  const params = new URLSearchParams();
  if (topics !== 'ALL') params.set('topics', topics);
  if (ranks !== 'A*,A,B') params.set('ranks', ranks);
  if (sort !== 'deadline') params.set('sort', sort);
  if (q) params.set('q', q);
  if (past) params.set('past', '1');
  const qs = params.toString();
  history.replaceState(null, '', qs ? '?' + qs : location.pathname);
}

function loadURL() {
  const params = new URLSearchParams(location.search);
  if (params.has('topics')) {
    activeTopics = new Set(params.get('topics').split(','));
    document.querySelectorAll('[data-topic]').forEach(b => b.classList.remove('active'));
    activeTopics.forEach(t => {
      const btn = document.querySelector(`[data-topic="${t}"]`);
      if (btn) btn.classList.add('active');
    });
  }
  if (params.has('ranks')) {
    activeRanks = new Set(params.get('ranks').split(','));
    document.querySelectorAll('.ranking-btn').forEach(b => {
      if (activeRanks.has(b.dataset.rank)) b.classList.add('active');
      else b.classList.remove('active');
    });
  }
  if (params.has('sort')) {
    currentSort = params.get('sort');
    document.querySelectorAll('.sort-btn').forEach(b => {
      if (b.dataset.sort === currentSort) b.classList.add('active');
      else b.classList.remove('active');
    });
  }
  if (params.has('q')) document.getElementById('searchInput').value = params.get('q');
  if (params.get('past') === '1') document.getElementById('showPast').checked = true;
}

function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

// Live countdown update every minute
function startLiveCountdowns() {
  setInterval(() => {
    document.querySelectorAll('.conf-card').forEach(card => {
      const dl = card.dataset.deadline;
      if (!dl) return;
      const days = daysUntil(dl);
      const { text, cls } = countdownStr(days);
      const el = card.querySelector('.countdown-display');
      const unitEl = card.querySelector('.countdown-unit');
      if (el) {
        el.textContent = text;
        el.className = 'countdown-display ' + cls;
      }
      if (unitEl && cls !== 'past') {
        const u = Math.abs(days) === 1 ? 'day' : 'days';
        unitEl.textContent = cls === 'past' ? '' : u + ' left';
      }
    });
  }, 60000);
}

// Boot
buildTopicFilters();
loadURL();
applyFilters();
startLiveCountdowns();
</script>
</body>
</html>
